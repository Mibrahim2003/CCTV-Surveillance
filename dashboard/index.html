<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeWatch | CCTV Monitoring Dashboard</title>
    <meta name="description" content="SafeWatch AI-Powered CCTV Anomaly Detection Dashboard">
    <style>
        /* ============================================
           DESIGN SYSTEM
           ============================================ */
        :root {
            --bg-primary: #0a0e17;
            --bg-card: #111827;
            --bg-card-hover: #1a2332;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-default: #1e293b;
            --border-normal: #334155;

            /* Status colors */
            --color-alert: #ef4444;
            --color-alert-glow: rgba(239, 68, 68, 0.45);
            --color-warning: #eab308;
            --color-warning-glow: rgba(234, 179, 8, 0.35);
            --color-normal: #22c55e;

            /* Accent */
            --accent-blue: #3b82f6;
            --accent-blue-dim: rgba(59, 130, 246, 0.15);
        }

        /* ============================================
           RESET & BASE
           ============================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================
           HEADER
           ============================================ */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border-default);
            background: linear-gradient(180deg, rgba(17, 24, 39, 0.8) 0%, transparent 100%);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent-blue), #6366f1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--accent-blue);
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--border-default);
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-alert);
            transition: background 0.3s;
        }

        .connection-status.connected .connection-dot {
            background: var(--color-normal);
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ============================================
           STATS BAR
           ============================================ */
        .stats-bar {
            display: flex;
            gap: 24px;
            padding: 16px 32px;
            border-bottom: 1px solid var(--border-default);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .stat-value {
            font-weight: 700;
            font-size: 15px;
            color: var(--text-primary);
        }

        .stat-value.alert-count { color: var(--color-alert); }
        .stat-value.warning-count { color: var(--color-warning); }

        /* ============================================
           CAMERA GRID
           ============================================ */
        .grid-container {
            padding: 28px 32px;
        }

        .camera-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        /* ============================================
           CAMERA TILE
           ============================================ */
        .camera-tile {
            background: var(--bg-card);
            border: 2px solid var(--border-normal);
            border-radius: 14px;
            padding: 0;
            overflow: hidden;
            transition: border-color 0.4s, box-shadow 0.4s, transform 0.2s;
        }

        .camera-tile:hover {
            transform: translateY(-2px);
            background: var(--bg-card-hover);
        }

        /* Status-specific tile styles */
        .camera-tile.status-ALERT {
            border-color: var(--color-alert);
            box-shadow: 0 0 20px var(--color-alert-glow), 0 0 60px rgba(239, 68, 68, 0.1);
            animation: glow-red 1.5s ease-in-out infinite alternate;
        }

        .camera-tile.status-WARNING {
            border-color: var(--color-warning);
            box-shadow: 0 0 16px var(--color-warning-glow), 0 0 40px rgba(234, 179, 8, 0.08);
            animation: glow-yellow 2s ease-in-out infinite alternate;
        }

        .camera-tile.status-NORMAL {
            border-color: var(--border-normal);
            box-shadow: none;
        }

        @keyframes glow-red {
            0% { box-shadow: 0 0 20px var(--color-alert-glow), 0 0 60px rgba(239, 68, 68, 0.1); }
            100% { box-shadow: 0 0 30px var(--color-alert-glow), 0 0 80px rgba(239, 68, 68, 0.2); }
        }

        @keyframes glow-yellow {
            0% { box-shadow: 0 0 16px var(--color-warning-glow), 0 0 40px rgba(234, 179, 8, 0.08); }
            100% { box-shadow: 0 0 24px var(--color-warning-glow), 0 0 50px rgba(234, 179, 8, 0.14); }
        }

        /* Tile Header */
        .tile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px;
        }

        .camera-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .live-badge {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(34, 197, 94, 0.15);
            color: var(--color-normal);
            text-transform: uppercase;
        }

        /* Tile Video Area */
        .tile-video {
            width: 100%;
            height: 180px;
            background: #0d1117;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .tile-video::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255,255,255,0.015) 2px,
                rgba(255,255,255,0.015) 4px
            );
            pointer-events: none;
        }

        .video-placeholder {
            color: var(--text-muted);
            font-size: 13px;
            z-index: 1;
        }

        /* Tile Footer */
        .tile-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-top: 1px solid var(--border-default);
        }

        .score-display {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .score-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .score-value {
            font-size: 28px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            transition: color 0.3s;
        }

        .score-value.ALERT { color: var(--color-alert); }
        .score-value.WARNING { color: var(--color-warning); }
        .score-value.NORMAL { color: var(--color-normal); }

        /* Status Badge */
        .status-badge {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 5px 12px;
            border-radius: 6px;
            text-transform: uppercase;
            transition: background 0.3s, color 0.3s;
        }

        .status-badge.ALERT {
            background: rgba(239, 68, 68, 0.15);
            color: var(--color-alert);
        }

        .status-badge.WARNING {
            background: rgba(234, 179, 8, 0.15);
            color: var(--color-warning);
        }

        .status-badge.NORMAL {
            background: rgba(34, 197, 94, 0.1);
            color: var(--color-normal);
        }
        .status-badge.OFFLINE {
            background: rgba(100,116,139,0.15);
            color: var(--text-muted);
        }
        .status-badge.CONNECTING {
            background: rgba(59,130,246,0.15);
            color: var(--accent-blue);
        }
        .status-badge.ERROR {
            background: rgba(249,115,22,0.15);
            color: #f97316;
        }
        .camera-tile.status-OFFLINE { border-color: var(--border-default); opacity: 0.55; }
        .camera-tile.status-CONNECTING { border-color: var(--accent-blue); animation: glow-blue 1s ease-in-out infinite alternate; }
        .camera-tile.status-ERROR { border-color: #f97316; }
        @keyframes glow-blue {
            0% { box-shadow: 0 0 12px rgba(59,130,246,0.3); }
            100% { box-shadow: 0 0 22px rgba(59,130,246,0.5); }
        }
        .score-value.OFFLINE, .score-value.CONNECTING, .score-value.ERROR { color: var(--text-muted); }
        .live-badge.offline-badge { background: rgba(100,116,139,0.15); color: var(--text-muted); }
        .live-badge.connecting-badge { background: rgba(59,130,246,0.15); color: var(--accent-blue); }
        .live-badge.error-badge { background: rgba(249,115,22,0.15); color: #f97316; }

        /* + Add Camera tile */
        .camera-tile.add-tile {
            border: 2px dashed var(--border-normal);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 240px; cursor: pointer;
            opacity: 0.6; transition: opacity 0.2s, border-color 0.2s;
        }
        .camera-tile.add-tile:hover { opacity: 1; border-color: var(--accent-blue); }
        .add-tile-icon { font-size: 36px; margin-bottom: 10px; color: var(--text-muted); }
        .add-tile-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }

        /* Tile clickable cursor */
        .camera-tile:not(.add-tile) { cursor: pointer; }

        /* ============================================
           MANAGE MODAL
           ============================================ */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 100;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #161f2e; border: 1px solid var(--border-normal);
            border-radius: 16px; padding: 28px; width: 420px; max-width: 95vw;
            animation: modal-in 0.2s ease-out;
        }
        @keyframes modal-in {
            from { opacity:0; transform: scale(0.95) translateY(-10px); }
            to   { opacity:1; transform: scale(1) translateY(0); }
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .modal-title { font-size: 16px; font-weight: 700; }
        .modal-close {
            background: none; border: none; color: var(--text-muted);
            font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 6px;
        }
        .modal-close:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .modal-section { margin-bottom: 14px; }
        .modal-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .modal-input {
            width: 100%; background: #0d1117; border: 1px solid var(--border-normal);
            border-radius: 8px; padding: 10px 14px; color: var(--text-primary);
            font-size: 14px; outline: none;
        }
        .modal-input:focus { border-color: var(--accent-blue); }
        .modal-btn-row { display: flex; gap: 10px; margin-top: 8px; }
        .btn {
            flex: 1; padding: 10px 16px; border-radius: 8px; border: none;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: var(--accent-blue); color: #fff; }
        .btn-ghost { background: var(--bg-card-hover); color: var(--text-secondary); }
        .btn-danger { background: rgba(239,68,68,0.15); color: var(--color-alert); }
        .btn-warning { background: rgba(234,179,8,0.12); color: var(--color-warning); }
        .source-type-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab-btn {
            flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border-normal);
            background: none; color: var(--text-secondary); font-size: 12px;
            font-weight: 600; cursor: pointer; transition: all 0.15s;
        }
        .tab-btn.active { background: var(--accent-blue-dim); border-color: var(--accent-blue); color: var(--accent-blue); }
        .source-panel { display: none; }
        .source-panel.active { display: block; }
        .modal-divider { border: none; border-top: 1px solid var(--border-default); margin: 16px 0; }
        .modal-error { color: #f97316; font-size: 12px; margin-top: 6px; display: none; }
        .modal-error.visible { display: block; }
        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast {
            position: fixed; bottom: 28px; right: 28px;
            background: #1e293b; border: 1px solid var(--border-normal);
            border-radius: 10px; padding: 12px 18px;
            font-size: 13px; color: var(--text-primary);
            z-index: 200; opacity: 0; transform: translateY(10px);
            transition: all 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { border-color: #f97316; color: #f97316; }
        .toast.success { border-color: var(--color-normal); color: var(--color-normal); }

        /* ============================================
           ALERT LOG
           ============================================ */
        .log-section {
            padding: 0 32px 32px;
        }

        .log-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .alert-log {
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 12px;
        }

        .alert-log::-webkit-scrollbar {
            width: 6px;
        }

        .alert-log::-webkit-scrollbar-track {
            background: transparent;
        }

        .alert-log::-webkit-scrollbar-thumb {
            background: var(--border-normal);
            border-radius: 3px;
        }

        .log-entry {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border-default);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slide-in 0.3s ease-out;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        @keyframes slide-in {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-time {
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .log-camera {
            color: var(--accent-blue);
            font-weight: 600;
            flex-shrink: 0;
        }

        .log-status {
            font-weight: 700;
        }

        .log-status.ALERT { color: var(--color-alert); }
        .log-status.WARNING { color: var(--color-warning); }

        .log-score {
            color: var(--text-secondary);
            margin-left: auto;
        }

        .log-empty {
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo-icon">S</div>
            <div class="logo-text">Safe<span>Watch</span></div>
        </div>
        <div id="connectionStatus" class="connection-status">
            <div class="connection-dot"></div>
            <span id="connectionText">Disconnected</span>
        </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat-item">
            Cameras Online:
            <span class="stat-value" id="camerasOnline">4</span>
        </div>
        <div class="stat-item">
            Active Alerts:
            <span class="stat-value alert-count" id="activeAlerts">0</span>
        </div>
        <div class="stat-item">
            Warnings:
            <span class="stat-value warning-count" id="activeWarnings">0</span>
        </div>
    </div>

    <!-- Camera Grid -->
    <div class="grid-container">
        <div class="camera-grid" id="cameraGrid">
            <!-- Tiles generated by JS -->
        </div>
    </div>

    <!-- Alert Log -->
    <div class="log-section">
        <div class="log-title">Event Log</div>
        <div class="alert-log" id="alertLog">
            <div class="log-empty">Waiting for events...</div>
        </div>
    </div>

    <!-- Manage Camera Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="manageModal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Manage Camera</span>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>

            <!-- Connect section -->
            <div id="connectSection">
                <div class="modal-label">Connect Source</div>
                <div class="source-type-tabs">
                    <button class="tab-btn active" id="tabCctv" onclick="switchTab('cctv')">&#x25A6; CCTV</button>
                    <button class="tab-btn" id="tabVideo" onclick="switchTab('video')">&#x25B6; Video</button>
                </div>

                <!-- CCTV panel -->
                <div class="source-panel active" id="panelCctv">
                    <div class="modal-label">Stream URL (RTSP / HTTP)</div>
                    <input class="modal-input" id="cctvUrl" type="text" placeholder="rtsp://192.168.1.10/live">
                    <div class="modal-error" id="cctvError"></div>
                    <div class="modal-btn-row">
                        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                        <button class="btn btn-primary" id="btnConnectCctv" onclick="connectCctv()">Connect</button>
                    </div>
                </div>

                <!-- Video panel -->
                <div class="source-panel" id="panelVideo">
                    <div class="modal-label">Local File Path</div>
                    <input class="modal-input" id="videoPath" type="text" placeholder="C:\Videos\clip.avi or relative path">
                    <div class="modal-label" style="margin-top:12px">-- or upload --</div>
                    <input type="file" id="videoFile" accept=".avi,.mp4,.mkv,.mov,.webm" style="display:none" onchange="handleFileSelected()">
                    <div class="modal-btn-row">
                        <button class="btn btn-ghost" onclick="document.getElementById('videoFile').click()">Browse...</button>
                        <button class="btn btn-primary" id="btnConnectVideo" onclick="connectVideo()">Connect</button>
                    </div>
                    <div class="modal-error" id="videoError"></div>
                </div>
            </div>

            <hr class="modal-divider" id="modalDivider">

            <!-- Actions -->
            <div id="actionSection">
                <div class="modal-btn-row" id="disconnectRow" style="display:none">
                    <button class="btn btn-warning" onclick="disconnectCamera()">&#9209; Disconnect</button>
                </div>
                <div class="modal-btn-row" style="margin-top:8px">
                    <button class="btn btn-danger" onclick="removeCamera()">Remove Camera</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>


    <script>
        // =============================================
        // CONFIGURATION
        // =============================================
        let WS_URL = `ws://${window.location.hostname}:8765`;
        const MAX_LOG_ENTRIES = 50;

        // =============================================
        // STATE
        // =============================================
        // cameraStates keyed by index (number)
        const cameraStates = {};   // { index: {id, active, status, score} }
        let ws = null;
        let reconnectTimer = null;
        let activeModal = null;    // index of camera in modal

        // =============================================
        // INIT TILES
        // =============================================
        function initTiles(cameraList) {
            const grid = document.getElementById("cameraGrid");
            grid.innerHTML = "";

            cameraList.forEach(cam => {
                renderTile(cam);
                cameraStates[cam.index] = {
                    id: cam.id,
                    active: cam.active,
                    status: cam.active ? "NORMAL" : "OFFLINE",
                    score: 0,
                };
            });

            appendAddTile();
            updateOnlineCount();
        }

        function renderTile(cam) {
            const grid = document.getElementById("cameraGrid");
            // Remove existing tile if re-rendering
            const existing = document.getElementById("tile-" + cam.index);
            if (existing) existing.remove();

            const status = cam.active ? "NORMAL" : "OFFLINE";
            const tile = document.createElement("div");
            tile.className = `camera-tile status-${status}`;
            tile.id = "tile-" + cam.index;
            tile.setAttribute("data-index", cam.index);
            tile.onclick = () => openModal(cam.index);

            const badgeClass = cam.active ? "Live" : "Offline";
            const badgeCls   = cam.active ? "" : " offline-badge";
            tile.innerHTML = `
                <div class="tile-header">
                    <span class="camera-name" id="name-${cam.index}">${cam.id}</span>
                    <span class="live-badge${badgeCls}" id="livebadge-${cam.index}">${badgeClass}</span>
                </div>
                <div class="tile-video" id="video-${cam.index}">
                    ${cam.active
                        ? `<img class="video-feed" id="feed-${cam.index}" src="/feed/${cam.index}" alt="${cam.id}"
                               onerror="this.style.display='none';document.getElementById('placeholder-${cam.index}').style.display='flex'" />
                           <span class="video-placeholder" id="placeholder-${cam.index}" style="display:none">${cam.id} -- No Signal</span>`
                        : `<span class="video-placeholder" id="placeholder-${cam.index}">${cam.id} -- Offline</span>`
                    }
                </div>
                <div class="tile-footer">
                    <div class="score-display">
                        <span class="score-label">Score&nbsp;</span>
                        <span class="score-value ${status}" id="score-${cam.index}">${cam.active ? '0.00' : '--'}</span>
                    </div>
                    <span class="status-badge ${status}" id="badge-${cam.index}">${status}</span>
                </div>
            `;
            // Insert before add tile if it exists
            const addTile = document.getElementById("add-tile");
            if (addTile) grid.insertBefore(tile, addTile);
            else grid.appendChild(tile);
        }

        function appendAddTile() {
            const grid = document.getElementById("cameraGrid");
            let addTile = document.getElementById("add-tile");
            if (addTile) return;
            addTile = document.createElement("div");
            addTile.className = "camera-tile add-tile";
            addTile.id = "add-tile";
            addTile.onclick = createCamera;
            addTile.innerHTML = `<div class="add-tile-icon">+</div><div class="add-tile-label">Add Camera</div>`;
            grid.appendChild(addTile);
        }

        // =============================================
        // UPDATE TILE STATE
        // =============================================
        function setTileStatus(index, status, score) {
            const tile    = document.getElementById("tile-" + index);
            const scoreEl = document.getElementById("score-" + index);
            const badgeEl = document.getElementById("badge-" + index);
            if (!tile) return;

            tile.className = "camera-tile status-" + status;
            if (scoreEl) { scoreEl.textContent = (score !== null) ? score.toFixed(2) : "--"; scoreEl.className = "score-value " + status; }
            if (badgeEl) { badgeEl.textContent = status; badgeEl.className = "status-badge " + status; }

            if (cameraStates[index]) cameraStates[index].status = status;
            updateOnlineCount();
            updateStats();
        }

        function setTileLiveBadge(index, label, extraClass) {
            const el = document.getElementById("livebadge-" + index);
            if (el) { el.textContent = label; el.className = "live-badge" + (extraClass ? " " + extraClass : ""); }
        }

        function updateOnlineCount() {
            const count = Object.values(cameraStates).filter(s => s.active).length;
            document.getElementById("camerasOnline").textContent = count;
        }

        function updateStats() {
            let alerts = 0, warnings = 0;
            Object.values(cameraStates).forEach(s => {
                if (s.status === "ALERT") alerts++;
                if (s.status === "WARNING") warnings++;
            });
            document.getElementById("activeAlerts").textContent = alerts;
            document.getElementById("activeWarnings").textContent = warnings;
        }

        // =============================================
        // WEBSOCKET -- uses camera_index for tile matching
        // =============================================
        function connect() {
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                const el = document.getElementById("connectionStatus");
                el.classList.add("connected");
                document.getElementById("connectionText").textContent = "Connected";
            };
            ws.onclose = () => {
                document.getElementById("connectionStatus").classList.remove("connected");
                document.getElementById("connectionText").textContent = "Disconnected";
                reconnectTimer = setTimeout(connect, 3000);
            };
            ws.onerror = () => ws.close();
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    const { camera, camera_index, score, status } = data;
                    if (camera_index !== undefined && score !== undefined && status) {
                        setTileStatus(camera_index, status, score);
                        addLogEntry(camera, camera_index, score, status);
                    }
                } catch(e) { console.error("[SafeWatch] WS parse error:", e); }
            };
        }

        // =============================================
        // LOG
        // =============================================
        function addLogEntry(camera, index, score, status) {
            if (status === "NORMAL") return;
            const log = document.getElementById("alertLog");
            const empty = log.querySelector(".log-empty");
            if (empty) empty.remove();

            const time = new Date().toTimeString().split(" ")[0];
            const entry = document.createElement("div");
            entry.className = "log-entry";
            entry.innerHTML = `
                <span class="log-time">${time}</span>
                <span class="log-camera">${camera}</span>
                <span class="log-status ${status}">${status}</span>
                <span class="log-score">Score: ${score.toFixed(2)}</span>
            `;
            log.insertBefore(entry, log.firstChild);
            while (log.children.length > MAX_LOG_ENTRIES) log.removeChild(log.lastChild);
        }

        // =============================================
        // MODAL
        // =============================================
        function openModal(index) {
            activeModal = index;
            const state = cameraStates[index];
            document.getElementById("modalTitle").textContent = state ? state.id : "Manage Camera";
            document.getElementById("cctvUrl").value = "";
            document.getElementById("videoPath").value = "";
            document.getElementById("cctvError").textContent = "";
            document.getElementById("cctvError").classList.remove("visible");
            document.getElementById("videoError").textContent = "";
            document.getElementById("videoError").classList.remove("visible");
            switchTab("cctv");

            // Show/hide disconnect button
            const isActive = state && state.active;
            document.getElementById("disconnectRow").style.display = isActive ? "flex" : "none";
            // Hide connect tabs if active
            document.getElementById("connectSection").style.display = isActive ? "none" : "block";
            document.getElementById("modalDivider").style.display = "block";

            document.getElementById("modalOverlay").classList.add("open");
        }

        function closeModal() {
            document.getElementById("modalOverlay").classList.remove("open");
            activeModal = null;
        }

        // Close on overlay click
        document.getElementById("modalOverlay").addEventListener("click", e => {
            if (e.target === document.getElementById("modalOverlay")) closeModal();
        });

        function switchTab(tab) {
            document.getElementById("tabCctv").classList.toggle("active", tab === "cctv");
            document.getElementById("tabVideo").classList.toggle("active", tab === "video");
            document.getElementById("panelCctv").classList.toggle("active", tab === "cctv");
            document.getElementById("panelVideo").classList.toggle("active", tab === "video");
        }

        // =============================================
        // CAMERA ACTIONS
        // =============================================
        async function createCamera() {
            // Count cameras for auto-name
            const n = Object.keys(cameraStates).length + 1;
            const name = `Camera ${n}`;
            const resp = await fetch("/api/cameras", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({id: name}),
            });
            const data = await resp.json();
            if (data.camera) {
                cameraStates[data.camera.index] = {id: data.camera.id, active: false, status: "OFFLINE", score: 0};
                renderTile(data.camera);
                appendAddTile();
                updateOnlineCount();
                showToast(`${data.camera.id} added`, "success");
            } else {
                showToast(data.error || "Failed to add camera", "error");
            }
        }

        async function connectCctv() {
            const url = document.getElementById("cctvUrl").value.trim();
            if (!url) { showError("cctvError", "Enter a stream URL"); return; }
            setBtnLoading("btnConnectCctv", true);
            const result = await doConnect(activeModal, "cctv", url);
            setBtnLoading("btnConnectCctv", false);
            if (result) closeModal();
        }

        async function connectVideo() {
            const path = document.getElementById("videoPath").value.trim();
            if (!path) { showError("videoError", "Enter a file path"); return; }
            setBtnLoading("btnConnectVideo", true);
            const result = await doConnect(activeModal, "video_path", path);
            setBtnLoading("btnConnectVideo", false);
            if (result) closeModal();
        }

        async function handleFileSelected() {
            const file = document.getElementById("videoFile").files[0];
            if (!file) return;
            setBtnLoading("btnConnectVideo", true);
            showError("videoError", "");

            // Upload file
            const uploadResp = await fetch(`/api/videos?filename=${encodeURIComponent(file.name)}`, {
                method: "POST",
                headers: {"Content-Type": "application/octet-stream"},
                body: file,
            });
            const uploadData = await uploadResp.json();
            if (!uploadResp.ok || !uploadData.filename) {
                setBtnLoading("btnConnectVideo", false);
                showError("videoError", uploadData.error || "Upload failed");
                return;
            }
            // Auto-connect after upload
            const result = await doConnect(activeModal, "video_upload", uploadData.filename);
            setBtnLoading("btnConnectVideo", false);
            if (result) closeModal();
        }

        async function doConnect(index, source_type, source) {
            setTileStatus(index, "CONNECTING", null);
            setTileLiveBadge(index, "Connecting", "connecting-badge");

            const resp = await fetch(`/api/cameras/${index}/connect`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({source_type, source}),
            });
            const data = await resp.json();

            if (data.camera) {
                // Rebuild tile with live feed
                cameraStates[index] = {id: data.camera.id, active: true, status: "NORMAL", score: 0};
                renderTile(data.camera);
                appendAddTile();
                updateOnlineCount();
                showToast(`${data.camera.id} connected`, "success");
                return true;
            } else {
                setTileStatus(index, "ERROR", null);
                setTileLiveBadge(index, "Error", "error-badge");
                const errId = source_type === "cctv" ? "cctvError" : "videoError";
                showError(errId, data.error || "Connection failed");
                showToast(data.error || "Connection failed", "error");
                return false;
            }
        }

        async function disconnectCamera() {
            if (activeModal === null) return;
            const index = activeModal;
            closeModal();
            const resp = await fetch(`/api/cameras/${index}/disconnect`, {method: "POST"});
            const data = await resp.json();
            if (data.camera) {
                cameraStates[index] = {id: data.camera.id, active: false, status: "OFFLINE", score: 0};
                renderTile(data.camera);
                appendAddTile();
                updateOnlineCount();
                showToast(`${data.camera.id} disconnected`, "success");
            } else {
                showToast(data.error || "Disconnect failed", "error");
            }
        }

        async function removeCamera() {
            if (activeModal === null) return;
            const index = activeModal;
            const name = cameraStates[index] ? cameraStates[index].id : `Camera ${index}`;
            if (!confirm(`Remove ${name}?`)) return;
            closeModal();

            const resp = await fetch(`/api/cameras/${index}`, {method: "DELETE"});
            const data = await resp.json();
            if (data.cameras !== undefined) {
                delete cameraStates[index];
                const tile = document.getElementById("tile-" + index);
                if (tile) tile.remove();
                updateOnlineCount();
                updateStats();
                showToast(`${name} removed`, "success");
            } else {
                showToast(data.error || "Remove failed", "error");
            }
        }

        // =============================================
        // HELPERS
        // =============================================
        function showError(id, msg) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = msg;
            el.classList.toggle("visible", !!msg);
        }

        function setBtnLoading(id, loading) {
            const btn = document.getElementById(id);
            if (!btn) return;
            btn.disabled = loading;
            btn.innerHTML = loading ? `<span class="spinner"></span>Connecting...` : btn.textContent.replace(/.*Connecting\.\.\./, "Connect");
            if (!loading) btn.innerHTML = "Connect";
        }

        let toastTimer = null;
        function showToast(msg, type) {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.className = `toast ${type || ""} show`;
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove("show"), 3500);
        }

        // =============================================
        // BOOT
        // =============================================
        fetch('/api/cameras')
            .then(r => r.json())
            .then(payload => {
                if (payload.ws_port) WS_URL = `ws://${window.location.hostname}:${payload.ws_port}`;
                initTiles(payload.cameras || payload);
                connect();
            })
            .catch(() => {
                initTiles([
                    {index: 0, id: 'Camera 1', active: true},
                    {index: 1, id: 'Camera 2', active: false},
                    {index: 2, id: 'Camera 3', active: false},
                    {index: 3, id: 'Camera 4', active: false},
                ]);
                connect();
            });
    </script>

</body>
</html>
